services:
  beacon:
    build: .
    ports:
      - "5010:5000"  # Public API
      - "5011:5001"  # Admin panel
    volumes:
      - beacon_data:/app/data
    environment:
      # Core settings (required)
      - Beacon__SigningKey=${BEACON_SIGNING_KEY}
      - Beacon__EncryptionKey=${BEACON_ENCRYPTION_KEY}
      - Beacon__Pepper=${BEACON_PEPPER}
      - Beacon__AdminApiKey=Beacon-Api-Key
      - Beacon__ConnectionString=Data Source=/app/data/Beacon.db

      # Demo
      - Beacon__DisableEmailNotifications=true
      - Beacon__UserAuthentication=

      # Port-based routing (default, no reverse proxy)
      - Beacon__ApiPort=5000
      - Beacon__AdminPort=5001

      # Host-based routing (for reverse proxy deployments)
      - Beacon__ApiHosts=beacon-demo-api.melosso.com
      - Beacon__AdminHosts=beacon-demo.melosso.com
      - Beacon__AllowedOrigins=https://beacon-demo.melosso.com,https://beacon-demo-api.melosso.com
      - Beacon__TrustForwardedHeaders=true

volumes:
  beacon_data:
